# config/services.yaml
parameters:
    course_images_directory: '%kernel.project_dir%/public/uploads/images'
    part_videos_directory: '%kernel.project_dir%/public/uploads/videos'
    upload_directory: '%kernel.project_dir%/public/uploads'
    app.request_context.base_url: 'http://127.0.0.1:8000' # Adjust for your environment

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\CourseProgressService:
        arguments:
            $entityManager: '@doctrine.orm.entity_manager'

    App\Service\QuizService:
        arguments:
            $entityManager: '@doctrine.orm.entity_manager'
            $logger: '@logger'
            $geminiApiKey: '%env(GEMINI_API_KEY)%'

    App\Controller\CourseController:
        arguments:
            $entityManager: '@doctrine.orm.entity_manager'
            $progressService: '@App\Service\CourseProgressService'
            $quizService: '@App\Service\QuizService'
            $logger: '@logger'

    App\Twig\AppExtension:
        arguments:
            $tokenStorage: '@security.token_storage'
            $entityManager: '@doctrine.orm.entity_manager'
            $quizAttemptRepository: '@App\Repository\QuizAttemptRepository'
        tags: ['twig.extension']