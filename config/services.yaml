# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    course_images_directory: '%kernel.project_dir%/public/uploads/images'
    part_videos_directory: '%kernel.project_dir%/public/uploads/videos'
    upload_directory: '%kernel.project_dir%/public/uploads'
    avatars_directory: '%kernel.project_dir%/public/uploads/avatars'
    comment_media_directory: '%kernel.project_dir%/public/uploads/comment_media'
    app.request_context.base_url: '/'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\CourseProgressService:
        arguments:
            $entityManager: '@doctrine.orm.entity_manager'

    App\Service\QuizService:
        arguments:
            $entityManager: '@doctrine.orm.entity_manager'
            $logger: '@logger'
            $geminiApiKey: '%env(GEMINI_API_KEY)%'

    App\Controller\CourseController:
        arguments:
            $entityManager: '@doctrine.orm.entity_manager'
            $progressService: '@App\Service\CourseProgressService'
            $quizService: '@App\Service\QuizService'
            $logger: '@logger'
            $cacheDir: '%kernel.cache_dir%'

    App\Twig\AppExtension:
        arguments:
            $tokenStorage: '@security.token_storage'
            $entityManager: '@doctrine.orm.entity_manager'
            $quizAttemptRepository: '@App\Repository\QuizAttemptRepository'
        tags: ['twig.extension']

    App\Controller\ForumController:
        arguments:
            $entityManager: '@doctrine.orm.entity_manager'
            $slugger: '@slugger'
            $logger: '@logger'